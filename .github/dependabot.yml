version: 2

updates:
  - package-ecosystem: composer
    directory: /api
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    pull-request-branch-name:
      separator: "/"
    groups:
      security-patches:
        patterns:
          - "*"
        update-types:
          - "patch"

  - package-ecosystem: npm
    directory: /pwa
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    pull-request-branch-name:
      separator: "/"
    groups:
      security-patches:
        patterns:
          - "*"
        update-types:
          - "patch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    pull-request-branch-name:
      separator: "/"
